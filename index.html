<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Supabase Secret Chat</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button id="theme-btn" class="theme-toggle" title="Toggle Dark Mode">
    <svg id="sun-icon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    <svg id="moon-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  </button>

  <div id="app-container">
    <div id="landing-view" class="view-container">
      <div class="card">
        <h1 class="app-title">Supabase Chat</h1>
        <div class="tabs">
          <button id="tab-join" class="tab active">Join</button>
          <button id="tab-create" class="tab">Create</button>
        </div>
        <form id="form-join" class="form-panel">
          <input type="text" id="join-username" placeholder="Username" required />
          <input type="text" id="join-code" placeholder="Room Code" required />
          <button type="submit" class="btn btn-primary">Join Room</button>
        </form>
        <form id="form-create" class="form-panel hidden">
          <input type="text" id="create-username" placeholder="Username" required />
          <button type="submit" class="btn btn-primary">Create New Room</button>
        </form>
      </div>
    </div>

    <div id="chat-view" class="view-container hidden">
      <div class="chat-container">
        <header class="chat-header">
          <div class="header-info">
            <h2 id="room-code-display">Room: -----</h2>
            <p id="current-user-display">You: user</p>
          </div>
          <div class="header-actions">
            <button id="btn-copy-link" class="btn btn-secondary btn-sm">Copy Link</button>
            <button id="btn-leave" class="btn btn-danger btn-sm">Leave</button>
          </div>
        </header>
        <main id="messages-list" class="messages-list"></main>
        <footer class="chat-footer">
          <div id="upload-indicator" class="upload-indicator hidden">Uploading...</div>
          <form id="form-message" class="message-form">
            <label for="file-input" class="file-label">📎</label>
            <input type="file" id="file-input" accept="image/*,video/*" class="hidden" />
            <input type="text" id="message-input" placeholder="Type a message..." />
            <button type="submit" id="btn-send" class="btn btn-primary">Send</button>
          </form>
          <div id="file-preview-name" class="file-preview-name hidden">
            <span></span> <button type="button" id="btn-clear-file">&times;</button>
          </div>
        </footer>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="app.js"></script>
</body>
</html>
